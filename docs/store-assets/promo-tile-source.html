<!doctype html>
<meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; background: #16181D; }
  body { display: grid; place-items: center; }

  .tile {
    width: 440px; height: 280px; box-sizing: border-box;
    background: radial-gradient(120% 160% at 8% 0%, #1E2128 0%, #16181D 62%);
    color: #F7F8F9;
    font-family: -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
    padding: 30px 32px 26px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }

  .brand { display: flex; align-items: center; gap: 13px; }
  .ring {
    width: 34px; height: 34px; border-radius: 50%;
    border: 9px solid #F5A524; box-sizing: border-box;
  }
  .word { font-size: 44px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }

  .tag {
    margin-top: 10px; font-size: 17.5px; font-weight: 500;
    color: #C9CDD3; letter-spacing: 0.1px;
  }
  .tag b { color: #F5A524; font-weight: 600; }

  .trace {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12.5px; line-height: 1.9; color: #8A8F98;
    border-left: 2px solid #F5A524; padding-left: 14px;
    margin-left: 2px;
  }
  .trace .ok { color: #C9CDD3; }
  .trace .ok::after { content: "  ✓"; color: #F5A524; }
  .live { color: #F7F8F9; display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #F5A524;
    box-shadow: 0 0 8px 2px rgba(245, 165, 36, 0.45);
  }
</style>
<div class="tile">
  <div>
    <div class="brand"><div class="ring"></div><div class="word">Otto</div></div>
    <div class="tag">Your browser, <b>on autopilot</b>.</div>
  </div>
  <div class="trace">
    <div class="ok">open dashboard</div>
    <div class="ok">read this week’s numbers</div>
    <div class="live"><span class="dot"></span>typing the summary…</div>
  </div>
</div>
